language: GHC2021

ghc-options:
  - -Wall
  - -optP-Wno-nonportable-include-path
  - -Wincomplete-record-updates
  - -Wincomplete-uni-patterns
  - -Wmissing-deriving-strategies
  - -Wunused-foralls
  - -fprint-explicit-foralls
  - -fprint-explicit-kinds

default-extensions:
  - DataKinds
  - DeriveDataTypeable
  - DeriveGeneric
  - DeriveTraversable
  - DerivingStrategies
  - DerivingVia
  - ExplicitForAll
  - FlexibleContexts
  - FlexibleInstances
  - GeneralizedNewtypeDeriving
  - ImportQualifiedPost
  - LambdaCase
  - MultiParamTypeClasses
  - MultiWayIf
  - NamedFieldPuns
  - NoStarIsType
  - NumericUnderscores
  - OverloadedStrings
  - ScopedTypeVariables
  - StrictData
  - TypeApplications
  - TypeFamilies
  - TypeOperators
  - TypeSynonymInstances
  - ViewPatterns

name: tabler-icons
version: 0.1.0.0
license: MIT
copyright: 2025 Sridhar Ratnakumar
maintainer: srid@srid.ca
author: Sridhar Ratnakumar
category: Web
synopsis: Haskell bindings for Tabler SVG icons
description: |
  Haskell bindings for the Tabler icons library.
  
  This package provides access to Tabler SVG icons as ByteString values,
  allowing them to be embedded directly in Haskell web applications.
  
  The icons are sourced from https://github.com/tabler/tabler-icons

dependencies:
  - name: base
    version: ">= 4 && < 5"
  - bytestring

library:
  source-dirs: src
  exposed-modules:
    - Web.TablerIcons
    - Web.TablerIcons.Outline
    - Web.TablerIcons.Filled